<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>Вхід - Світова архітектура</title>
</head>
<body>
    <header>
        <h1>Світова архітектура</h1>
        <h3>Довідник найвідоміших споруд людства</h3>
    </header>

    <nav>
        <input type="checkbox" id="menu-toggle" class="menu-checkbox">
        <label for="menu-toggle" class="mobile-menu-btn" onclick="">Меню</label>
        <ul>
            <li><a href="index.html">Головна</a></li>
            <li><a href="login.html">Вхід</a></li>
            <li><a href="register.html">Реєстрація</a></li>
            <li><a href="feedback.html">Зворотній зв’язок</a></li>
        </ul>
    </nav>

    <main>
        <h2>Вхід до системи</h2>
        <form action="#" method="post">
            <p>
                <label for="login">Логін:</label><br>
                <input type="text" id="login" name="login" required>
            </p>
            <p>
                <label for="password">Пароль:</label><br>
                <input type="password" id="password" name="password" required>
            </p>
            <p>
                <input type="checkbox" id="remember" name="remember">
                <label for="remember">Залишатися в системі</label>
            </p>
            <button type="submit">Увійти</button>
        </form>
    </main>

    <footer>
        <p>2026 Лабораторна 1</p>
    </footer>
</body>
</html>
