<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <link rel="stylesheet" href="style.css">
    <title>Зворотній зв’язок - Світова архітектура</title>
</head>
<body>
    <nav>
        <ul>
            <li><a href="index.html">Головна</a></li>
            <li><a href="login.html">Вхід</a></li>
            <li><a href="register.html">Реєстрація</a></li>
            <li><a href="feedback.html">Зворотній зв’язок</a></li>
        </ul>
    </nav>
    <main>
        <h2>Зворотній зв’язок</h2>
        <form action="#" method="post" enctype="multipart/form-data">
            <p>
                <label for="first_name">Ім’я:</label><br>
                <input type="text" id="first_name" name="first_name" required>
            </p>
            <p>
                <label for="last_name">Прізвище:</label><br>
                <input type="text" id="last_name" name="last_name" required>
            </p>
            <p>
                <label for="user_email">Електронна пошта:</label><br>
                <input type="email" id="user_email" name="user_email" required>
            </p>
            <p>
                <label for="phone">Номер телефону:</label><br>
                <input type="tel" id="phone" name="phone">
            </p>
            <p>
                <label for="message">Текст повідомлення:</label><br>
                <textarea id="message" name="message" rows="4" cols="30" required></textarea>
            </p>
            <fieldset>
                <legend>Бажаний спосіб зв'язку:</legend>
                <input type="radio" id="contact_phone" name="contact_method" value="phone">
                <label for="contact_phone">Телефон</label><br>
                <input type="radio" id="contact_email" name="contact_method" value="email" checked>
                <label for="contact_email">Електронна пошта</label>
            </fieldset>
            <p>
                <label for="msg_type">Тип повідомлення:</label><br>
                <select id="msg_type" name="msg_type">
                    <option value="question">Питання</option>
                    <option value="suggestion">Побажання</option>
                    <option value="complaint">Скарга</option>
                    <option value="other">Інше</option>
                </select>
            </p>
            <p>
                <label for="file_upload">Додати зображення:</label><br>
                <input type="file" id="file_upload" name="file_upload" accept="image/*">
            </p>
            <button type="submit">Відправити</button>
        </form>
    </main>
    <footer>
        <p>2026 Лабораторна 1</p>
    </footer>
</body>
</html>
