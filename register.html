<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <title>Реєстрація - Світова архітектура</title>
</head>
<body>
    <nav>
        <ul>
            <li><a href="index.html">Головна</a></li>
            <li><a href="login.html">Вхід</a></li>
            <li><a href="register.html">Реєстрація</a></li>
            <li><a href="feedback.html">Зворотній зв’язок</a></li>
        </ul>
    </nav>
    <hr>
    <main>
        <h2>Реєстрація нового користувача</h2>
        <form action="#" method="post">
            <p>
                <label for="email">Електронна пошта:</label><br>
                <input type="email" id="email" name="email" required>
            </p>
            <p>
                <label for="reg_login">Логін:</label><br>
                <input type="text" id="reg_login" name="reg_login" required>
            </p>
            <p>
                <label for="reg_password">Пароль:</label><br>
                <input type="password" id="reg_password" name="reg_password" required>
            </p>
            <p>
                <label for="confirm_password">Підтвердження пароля:</label><br>
                <input type="password" id="confirm_password" name="confirm_password" required>
            </p>
            <button type="submit">Зареєструватися</button>
            <button type="reset">Очистити форму</button>
        </form>
    </main>
    <footer>
        <hr>
        <p>2026 Лабораторна 1</p>
    </footer>
</body>
</html>
